services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: meterbill
      POSTGRES_PASSWORD: meterbill_secret
      POSTGRES_DB: meterbill
    ports:
      - "5432:5432"
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meterbill"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata: