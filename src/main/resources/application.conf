app {

  db {
    # ── Writer (primary) ──────────────────────────────────────────────
    primary-host = "localhost"
    primary-host = ${?DB_PRIMARY_HOST}

    # ── Reader (replica) ──────────────────────────────────────────────
    replica-host = "localhost"
    replica-host = ${?DB_REPLICA_HOST}

    port = 5432
    port = ${?DB_PORT}

    user = "postgres"
    user = ${?DB_USER}

    password = "s3cret"
    password = ${?DB_PASSWORD}

    database = "skunklab"
    database = ${?DB_NAME}

    # ── Pool sizing ───────────────────────────────────────────────────
    # At 10k RPS (~30% writes, ~70% reads):
    #   Writes: 3k RPS × ~5ms avg = 15 concurrent, 25 with headroom
    #   Reads:  7k RPS × ~3ms avg = 21 concurrent, 50 with headroom + burst
    # Ensure Postgres max_connections >= (writer + reader) × instance_count + admin overhead
    writer-pool-size = 25
    writer-pool-size = ${?DB_WRITER_POOL_SIZE}

    reader-pool-size = 50
    reader-pool-size = ${?DB_READER_POOL_SIZE}

    # ── Timeouts (Skunk-level) — fail fast at high throughput ─────────
    writer-read-timeout = 5s             # socket read timeout — tight for writes
    reader-read-timeout = 5s             # socket read timeout — tight for reads

    # ── Postgres server-side timeouts (connection parameters) ─────────
    writer-statement-timeout = 2000      # ms — writes must be fast; kill at 2s
    reader-statement-timeout = 5000      # ms — reads get more headroom; kill at 5s

    idle-in-transaction-timeout = 10000  # ms — aggressive cleanup avoids connection hogging
    lock-timeout = 2000                  # ms — fail fast on lock contention

    # ── TCP keepalive — critical for NAT/LB/cloud environments ────────
    tcp-keepalives-idle = 60             # seconds before first keepalive probe
    tcp-keepalives-interval = 10         # seconds between probes
    tcp-keepalives-count = 6             # probes before declaring dead

    # ── Security ──────────────────────────────────────────────────────
    ssl = "system"                       # system | trusted | none

    # ── Session parameters ────────────────────────────────────────────
    application-name = "skunk-lab"       # visible in pg_stat_activity for monitoring
    application-name = ${?DB_APPLICATION_NAME}

    # Keep low: 4MB × 50 reader sessions = 200MB max sort memory
    work-mem = "4MB"
    work-mem = ${?DB_WORK_MEM}

    # ── Cache sizing — large caches for prepared statement reuse ──────
    command-cache-size = 2048
    query-cache-size = 2048
    parse-cache-size = 2048
  }

  otel {
    tracer-name = "skunk-lab"
    tracer-name = ${?OTEL_TRACER_NAME}

    meter-name  = "skunk-lab"
    meter-name  = ${?OTEL_METER_NAME}
  }

}
