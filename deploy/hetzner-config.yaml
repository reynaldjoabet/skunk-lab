---
# Use HCLOUD_TOKEN env var instead of hardcoding:
#   export HCLOUD_TOKEN=<your-token>
# hetzner_token: <your-token>
cluster_name: production
kubeconfig_path: "./kubeconfig"
k3s_version: v1.32.0+k3s1

networking:
  ssh:
    port: 2222
    use_agent: true
    use_private_ip: true                # Connect to nodes via private IPs (required when workers have no public IPs)
    public_key_path: "~/.ssh/id_ed25519.pub"
    private_key_path: "~/.ssh/id_ed25519"
  allowed_networks:
    ssh:
      - <your-vpn-cidr>/32
    api:
      - <your-vpn-cidr>/32
    custom_firewall_rules:
      - description: "Allow HTTPS from anywhere"
        direction: in
        protocol: tcp
        port: 443
        source_ips:
          - 0.0.0.0/0
  public_network:
    ipv4: true
    ipv6: true
  private_network:
    enabled: true
    subnet: 10.0.0.0/16
  cni:
    enabled: true
    encryption: true
    mode: cilium

datastore:
  mode: etcd
  etcd:
    snapshot_retention: 24
    snapshot_schedule_cron: "0 */6 * * *"
    s3_enabled: true
    s3_endpoint: "<your-s3-endpoint>"
    s3_region: "<region>"
    s3_bucket: "<bucket>"
    # Use env vars ETCD_S3_ACCESS_KEY and ETCD_S3_SECRET_KEY
    s3_access_key: ""
    s3_secret_key: ""

schedule_workloads_on_masters: false

image: ubuntu-24.04

masters_pool:
  instance_type: cpx32
  instance_count: 3
  locations:
    - fsn1
    - hel1
    - nbg1

worker_node_pools:
  # Fixed baseline capacity — no public IPs
  - name: general
    instance_type: cpx32
    instance_count: 3
    location: fsn1
    enable_public_net_ipv4: false
    enable_public_net_ipv6: false
    labels:
      - key: workload-type
        value: general

  # Autoscaled burst pool — no public IPs
  - name: autoscaled
    instance_type: cpx32
    location: fsn1
    enable_public_net_ipv4: false
    enable_public_net_ipv6: false
    autoscaling:
      enabled: true
      min_instances: 2
      max_instances: 15
    labels:
      - key: workload-type
        value: burst

  # ARM workers — no public IPs, tainted
  - name: arm-workers
    instance_type: cax21
    instance_count: 2
    location: fsn1
    enable_public_net_ipv4: false
    enable_public_net_ipv6: false
    labels:
      - key: arch
        value: arm64
    taints:
      - key: arch
        value: arm64:NoSchedule

addons:
  csi_driver:
    enabled: true
  cloud_controller_manager:
    enabled: true
  system_upgrade_controller:
    enabled: true
  cluster_autoscaler:
    enabled: true
    scan_interval: "30s"
    scale_down_delay_after_add: "10m"
    scale_down_delay_after_delete: "10s"
    scale_down_delay_after_failure: "3m"
    max_node_provision_time: "15m"
  metrics_server:
    enabled: true
  embedded_registry_mirror:
    enabled: true

protect_against_deletion: true

create_load_balancer_for_the_kubernetes_api: true
api_server_hostname: k8s.example.com

k3s_upgrade_concurrency: 1

kube_api_server_args:
  - "audit-log-maxage=30"
  - "audit-log-maxbackup=10"
  - "audit-log-maxsize=100"