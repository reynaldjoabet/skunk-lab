
name: Scala CI

on:
  pull_request:
    types: [opened, closed,reopened,edited] 
    branches: [ "main" ]
  push:
    branches: ["main"] 
    
jobs:
  build_sbt:
    name: Build Project
    strategy:
      matrix:
        os: ["ubuntu-latest"]
        java: [temurin@17, temurin@21]
    runs-on: ${{matrix.os}}

    steps:
    - uses: actions/checkout@v5
      with:
       fetch-depth: 0
    - uses: coursier/cache-action@v6
    - uses: VirtusLab/scala-cli-setup@main
      with:
        jvm: ${{ matrix.java }}
        apps: sbt 
    - run: sbt compile