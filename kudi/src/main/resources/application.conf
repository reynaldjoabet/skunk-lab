app {

  db {
    # ── Writer (primary) ──────────────────────────────────────────────
    primary-host = "localhost"
    primary-host = ${?DB_PRIMARY_HOST}

    # ── Reader (replica) ──────────────────────────────────────────────
    replica-host = "localhost"
    replica-host = ${?DB_REPLICA_HOST}

    port = 5432
    port = ${?DB_PORT}

    user = "postgres"
    user = ${?DB_USER}

    password = "s3cret"
    password = ${?DB_PASSWORD}

    database = "kudi"
    database = ${?DB_NAME}

    # ── Pool sizing ───────────────────────────────────────────────────
    # Double-entry: each user request = 1 txn INSERT + 2 ledger INSERTs + audit
    # At 10k RPS (~30% writes): ~3k wallet txns/sec → ~10k total writes/sec
    # Writer: 3k RPS × ~5ms avg = 15 concurrent, 25 with headroom + burst
    # Reader: 7k RPS × ~3ms avg = 21 concurrent, 50 with headroom
    # postgresql.conf max_connections = 350 ≥ (25 + 50) × 4 instances + admin
    writer-pool-size = 25
    writer-pool-size = ${?DB_WRITER_POOL_SIZE}

    reader-pool-size = 50
    reader-pool-size = ${?DB_READER_POOL_SIZE}

    # ── Skunk-level timeouts ──────────────────────────────────────────
    writer-read-timeout = 5s
    reader-read-timeout = 5s

    # ── Postgres server-side timeouts (SET via connection parameters) ─
    # Writer: wallet transfers do SELECT...FOR UPDATE + 2 UPDATEs + 2 INSERTs
    # in a single txn — must complete fast to release row locks
    writer-statement-timeout = 2000      # ms — kill writes at 2s
    # Reader: analytics queries (Q4 fraud velocity, Q7 cohort, Q11 dashboard)
    # use window functions over partitioned data — need more headroom
    reader-statement-timeout = 5000      # ms — kill reads at 5s

    idle-in-transaction-timeout = 10000  # ms — aggressive: wallet row locks must not linger
    lock-timeout = 2000                  # ms — fail fast on FOR UPDATE contention

    # ── TCP keepalive — matches postgresql.conf ───────────────────────
    tcp-keepalives-idle = 60
    tcp-keepalives-interval = 10
    tcp-keepalives-count = 6

    # ── Security ──────────────────────────────────────────────────────
    ssl = "system"

    # ── Session parameters ────────────────────────────────────────────
    application-name = "kudi"
    application-name = ${?DB_APPLICATION_NAME}

    # work_mem: higher than default for window functions in fraud/analytics queries
    # 8MB × 50 reader sessions = 400MB worst case (within 64GB budget)
    work-mem = "8MB"
    work-mem = ${?DB_WORK_MEM}

    # ── Skunk prepared statement caches ───────────────────────────────
    # ~20 distinct queries × partitioned = many plans. Large caches avoid re-parsing.
    command-cache-size = 2048
    query-cache-size = 2048
    parse-cache-size = 2048
  }

  otel {
    tracer-name = "kudi"
    tracer-name = ${?OTEL_TRACER_NAME}

    meter-name  = "kudi"
    meter-name  = ${?OTEL_METER_NAME}
  }

}
