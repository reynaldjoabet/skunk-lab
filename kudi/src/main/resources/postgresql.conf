# =============================================================================
# postgresql.conf — Kudi Digital Wallet Platform
# =============================================================================
#
# Tuned for the V1__init.sql schema:
#   - 10 lookup tables, 10 core tables, 3 partitioned (monthly/quarterly)
#   - Double-entry ledger: every money movement = 2+ writes
#   - At 10k RPS (~30% writes): ~3k txn INSERTs + ~6k ledger INSERTs + audit = ~10k writes/sec
#   - Monthly partitions: transactions (18), ledger_entries (18), audit_log quarterly (6)
#   - Extensions: pg_stat_statements, pgcrypto, pg_trgm, citext
#   - PostgreSQL 18 features: uuidv7(), VIRTUAL columns, NOT ENFORCED, MERGE...RETURNING
#
# Hardware assumption: 64 GB RAM, 16 cores, NVMe SSD
# Pool assumption: 25 writers + 50 readers × 4 app instances = 300 + 50 admin = 350
# =============================================================================


# =============================================================================
# CONNECTION LIMITS
# =============================================================================

max_connections = 350                      # (25 + 50) × 4 instances + 50 admin/monitoring
superuser_reserved_connections = 5


# =============================================================================
# MEMORY
# =============================================================================

shared_buffers = '16GB'                    # 25% of 64GB — holds hot partitions + lookup tables
effective_cache_size = '48GB'              # 75% of RAM — planner hint (OS page cache + shared_buffers)
work_mem = '8MB'                           # per-sort/hash — higher for window functions in Q4/Q7/Q9/Q11
                                           # 8MB × 350 conns = 2.8GB worst case (acceptable on 64GB)
maintenance_work_mem = '1GB'               # VACUUM on partitioned tables, CREATE INDEX CONCURRENTLY
huge_pages = 'try'                         # reduce TLB misses — critical with 16GB shared_buffers
hash_mem_multiplier = 2.0                  # hash joins/aggregations get 2× work_mem


# =============================================================================
# WAL — Write-Ahead Log
# =============================================================================
# Double-entry = 2-3 WAL records per user request. At 10k RPS that's ~25k WAL
# inserts/sec. Size WAL generously to avoid checkpoint pressure.

wal_level = 'replica'
max_wal_size = '8GB'                       # higher for sustained write bursts (default 1GB too small)
min_wal_size = '2GB'
wal_buffers = '64MB'
wal_compression = 'zstd'                   # PG15+ — 30-40% WAL volume reduction
synchronous_commit = 'on'                  # financial data — never lose a committed transaction
checkpoint_completion_target = 0.9
checkpoint_timeout = '15min'               # longer interval — fewer full-table flushes


# =============================================================================
# BGWRITER
# =============================================================================

bgwriter_delay = '50ms'                    # flush dirty pages aggressively between checkpoints
bgwriter_lru_maxpages = 800                # high for write-heavy double-entry workload
bgwriter_lru_multiplier = 4.0


# =============================================================================
# QUERY PLANNER
# =============================================================================

random_page_cost = 1.1                     # NVMe — sequential/random nearly equal
effective_io_concurrency = 200             # parallel bitmap heap scan I/O
seq_page_cost = 1.0
default_statistics_target = 500            # high for skewed data: amount distributions, status_id selectivity
                                           # critical for partition pruning cost estimates

jit = off                                  # kills P50 latency on short OLTP queries
plan_cache_mode = 'force_generic_plan'     # skip re-planning — all queries are prepared via Skunk

# Partitioning planner
enable_partition_pruning = on              # prune unneeded monthly partitions (default on, explicit for docs)
enable_partitionwise_join = on             # join within partitions — helps ledger_entries ↔ transactions
enable_partitionwise_aggregate = on        # aggregate per-partition then merge — speeds Q3/Q5/Q11


# =============================================================================
# TRANSACTIONS & ISOLATION
# =============================================================================

default_transaction_isolation = 'read committed'
default_transaction_read_only = off


# =============================================================================
# TIMEOUTS
# =============================================================================

statement_timeout = '30s'                  # absolute ceiling — catch runaway analytics queries
lock_timeout = '5s'                        # global fallback — app sets 2s per-session
idle_in_transaction_session_timeout = '60s'  # kill abandoned txns holding row locks on wallets
deadlock_timeout = '500ms'                 # wallet transfers lock 2 rows — detect deadlocks fast
transaction_timeout = '120s'               # PG18: hard cap on total transaction lifetime


# =============================================================================
# TCP KEEPALIVE
# =============================================================================

tcp_keepalives_idle = 60
tcp_keepalives_interval = 10
tcp_keepalives_count = 6                   # detection time: 60 + (10 × 6) = 120s


# =============================================================================
# AUTOVACUUM
# =============================================================================
# The schema sets per-table overrides:
#   users:          vacuum_scale_factor=0.02, analyze_scale_factor=0.01
#   transactions:   vacuum_scale_factor=0.005, analyze_scale_factor=0.002
#   ledger_entries: vacuum_scale_factor=0.005, analyze_scale_factor=0.002
#
# These global defaults cover the remaining tables (wallets, notifications,
# audit_log, lookup tables, fee_schedule, exchange_rates, merchants, payment_methods).

autovacuum = on
autovacuum_max_workers = 8                 # 42 partitions + 10 regular tables need parallel vacuuming
autovacuum_naptime = '10s'                 # check every 10s — 42 partitions × 10s = full scan every ~50s
autovacuum_vacuum_threshold = 25
autovacuum_vacuum_scale_factor = 0.01      # 1% of table size triggers vacuum
autovacuum_analyze_threshold = 25
autovacuum_analyze_scale_factor = 0.005    # 0.5% — keep planner stats fresh for partition pruning
autovacuum_vacuum_cost_delay = '2ms'
autovacuum_vacuum_cost_limit = 1200        # aggressive — many partitions competing for vacuum slots
autovacuum_freeze_max_age = 200000000      # force freeze at 200M txns — prevent wraparound


# =============================================================================
# LOGGING
# =============================================================================

log_destination = 'jsonlog'                # PG15+ structured JSON — easier to parse with otel-collector
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_rotation_age = '1d'
log_rotation_size = '512MB'                # larger — high write volume generates more WAL/query logs

log_min_duration_statement = 50            # 50ms — catch anything above P95 for OLTP queries
log_line_prefix = '%t [%p-%l] %q%u@%d '
log_checkpoints = on
log_connections = off                      # too noisy at 10k RPS
log_disconnections = off
log_lock_waits = on                        # critical: detect wallet row lock contention
log_temp_files = '5MB'                     # flag sorts that spill — indicates work_mem too low
log_autovacuum_min_duration = '100ms'      # lower — catch slow partition vacuums early

log_statement = 'ddl'


# =============================================================================
# REPLICATION
# =============================================================================

max_wal_senders = 10
wal_keep_size = '4GB'                      # higher — double-entry produces 2-3× WAL volume
hot_standby = on


# =============================================================================
# REPLICA OVERRIDES (uncomment on replicas)
# =============================================================================
# hot_standby_feedback = on
# max_standby_streaming_delay = '30s'
# default_transaction_read_only = on


# =============================================================================
# EXTENSIONS
# =============================================================================

shared_preload_libraries = 'pg_stat_statements,auto_explain'

# pg_stat_statements — query performance tracking
pg_stat_statements.max = 10000
pg_stat_statements.track = 'top'
pg_stat_statements.track_utility = off

# auto_explain — log execution plans for slow queries
auto_explain.log_min_duration = '200ms'    # lower threshold — catch partition scan regressions
auto_explain.log_analyze = on
auto_explain.log_buffers = on
auto_explain.log_nested_statements = off


# =============================================================================
# SEQUENCES — uuidv7() uses system clock, no tuning needed.
# BIGINT IDENTITY columns use sequences; increase cache for high-throughput:
# =============================================================================
# ALTER SEQUENCE transactions_txn_id_seq CACHE 100;
# ALTER SEQUENCE ledger_entries_entry_id_seq CACHE 200;
# ALTER SEQUENCE audit_log_log_id_seq CACHE 50;
# ALTER SEQUENCE notifications_notification_id_seq CACHE 50;
