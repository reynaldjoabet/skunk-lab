ledgerpay {

  db {
    host = "localhost"
    host = ${?DB_HOST}

    port = 5432
    port = ${?DB_PORT}

    user = "ledgerpay"
    user = ${?DB_USER}

    password = "s3cret"
    password = ${?DB_PASSWORD}

    database = "ledgerpay"
    database = ${?DB_NAME}

    max-connections = 10
    max-connections = ${?DB_MAX_CONNECTIONS}

    read-timeout = 30s

    statement-timeout = 15000       # ms — Postgres server-side query timeout
    idle-in-transaction-timeout = 30000  # ms — kill idle-in-transaction sessions

    ssl = "system"                  # system | trusted | none

    redaction-strategy = "all"      # all | opt-in | none
    typing-strategy = "search-path" # search-path | builtins-only
  }

  otel {
    tracer-name = "ledgerpay"
    meter-name = "ledgerpay"
  }

}
